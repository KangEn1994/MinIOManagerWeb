name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_REPOSITORY: ${{ secrets.DOCKER_IMAGE_REPOSITORY }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub settings
        run: |
          test -n "${{ env.REGISTRY }}" || (echo "Missing secret DOCKER_REGISTRY" && exit 1)
          test -n "${{ env.IMAGE_REPOSITORY }}" || (echo "Missing secret DOCKER_IMAGE_REPOSITORY" && exit 1)
          test -n "${{ secrets.DOCKER_USERNAME }}" || (echo "Missing secret DOCKER_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKER_PASSWORD }}" || (echo "Missing secret DOCKER_PASSWORD" && exit 1)

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
