services:
  minio-manager-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: minio-manager-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "8080:8080"
    volumes:
      - ../backend/data:/app/data
